<div class="selector-bar">
  <div class="selector-group">
    <label class="selector-label">Dataset</label>
    <select class="selector-dropdown" [ngModel]="'wildchat'">
      <option value="wildchat">WildChat</option>
    </select>
  </div>

  <div class="selector-group">
    <label class="selector-label">Conversation</label>
    <app-multi-select-dropdown
      [items]="dropdownItems"
      [selectedIds]="selectedConversationHashes"
      [itemTypeName]="'conversation'"
      [allowRename]="false"
      [showSelectOnly]="true"
      (selectionChange)="onSelectionChange($event)">
    </app-multi-select-dropdown>
  </div>
</div>

<div class="workspace-wrapper">
  <!-- Left Side: Side-by-Side Arc Diagrams -->
  <div class="arcs-container">
    <div class="arc-panel" [class.single-col]="columns.length <= 1" *ngFor="let col of columns" [class.is-active-col]="col === activeColumn">
      <div *ngIf="isLoading" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">{{ loadingPhase }}</div>
      </div>

      <div class="svg-scroll-container" *ngIf="col.annotated" (click)="col.selectedSentenceGlobalIndex = null">
        <svg [attr.height]="col.svgHeight" class="arc-svg">
          <!-- Highlight Boxes (Rendered Behind Lines) -->
          <g class="highlight-boxes">
            <ng-container *ngFor="let ref of getFilteredReferencesForColumn(col)">
              <rect [attr.x]="getSentenceHighlightBoxForColumn(col, ref.targetGlobal).x"
                    [attr.y]="getSentenceHighlightBoxForColumn(col, ref.targetGlobal).y"
                    [attr.width]="getSentenceHighlightBoxForColumn(col, ref.targetGlobal).w"
                    [attr.height]="getSentenceHighlightBoxForColumn(col, ref.targetGlobal).h"
                    [attr.fill]="referenceColors[ref.type]"
                    [attr.opacity]="isArcDimmedForColumn(col, ref) ? 0.02 : 0.22" />
            </ng-container>
          </g>

          <!-- Active Sentence Outline -->
          <g class="active-outlines">
            <ng-container *ngIf="getActiveSentenceBoundingBoxForColumn(col) as box">
              <rect *ngIf="box.w > 0"
                    [attr.x]="box.x - 5"
                    [attr.y]="box.y - 4"
                    [attr.width]="box.w + 10"
                    [attr.height]="box.h + 8"
                    fill="none"
                    stroke="#0f172a"
                    stroke-width="1.5"
                    [attr.opacity]="col.hoveredSentenceGlobalIndex !== null || col.selectedSentenceGlobalIndex !== null ? 0.8 : 0" />
            </ng-container>
          </g>

          <!-- Sentence Lines -->
          <g class="sentence-lines">
            <ng-container *ngFor="let s of getAllSentencesForColumn(col)">
              <rect *ngFor="let seg of getSentenceLayoutForColumn(col, s.globalIndex).segments"
                    [attr.x]="seg.x"
                    [attr.y]="seg.y"
                    [attr.width]="seg.w"
                    [attr.height]="seg.h"
                    [attr.rx]="1"
                    class="sentence-line"
                    [class.active]="col.hoveredSentenceGlobalIndex === s.globalIndex || col.selectedSentenceGlobalIndex === s.globalIndex"
                    [class.connected]="isSentenceConnectedToActiveForColumn(col, s.globalIndex)"
                    (mouseenter)="hoverSentenceForColumn(col, s.globalIndex)"
                    (mouseleave)="hoverSentenceForColumn(col, null)"
                    (click)="selectSentenceForColumn(col, s.globalIndex); $event.stopPropagation()" />
            </ng-container>
          </g>

          <!-- Turn Labels -->
          <g class="turn-labels">
            <text *ngFor="let label of col.turnLabels"
                  [attr.x]="label.x"
                  [attr.y]="label.y"
                  [attr.text-anchor]="label.align"
                  class="turn-label-text">
              {{ label.text }}
            </text>
          </g>

          <!-- Reference Arcs -->
          <g class="reference-arcs">
            <path *ngFor="let ref of getFilteredReferencesForColumn(col)"
                  [attr.d]="getArcPathForColumn(col, ref)"
                  [attr.fill]="referenceColors[ref.type]"
                  [attr.opacity]="getArcOpacityForColumn(col, ref)"
                  class="reference-arc-path"
                  [class.dimmed]="isArcDimmedForColumn(col, ref)"
                  [class.highlighted]="isArcHighlightedForColumn(col, ref)" />
          </g>
        </svg>
      </div>

      <!-- Floating/Bottom Legend -->
      <div class="legend-container" *ngIf="col.annotated && col.references.length > 0">
        <div class="legend-section">
          <span class="legend-title">Reference Types:</span>
          <div class="legend-items">
            <div *ngFor="let type of getUsedReferenceTypesForColumn(col)" 
                 class="legend-item"
                 [class.active]="col.selectedReferenceType === type"
                 [class.dimmed]="col.selectedReferenceType !== null && col.selectedReferenceType !== type"
                 (click)="toggleReferenceTypeFilterForColumn(col, type); $event.stopPropagation()">
              <span class="legend-dot" [style.background-color]="referenceColors[type]"></span>
              <span class="legend-label">{{ referenceLabels[type] }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side: Single Conversation Viewer for the Active Column -->
  <div class="chat-panel" *ngIf="activeColumn">
    <app-conversation-viewer
      [title]="'Conversation Thread'"
      [subtitle]="activeColumn.annotated ? activeColumn.annotated.id : ''"
      [messages]="activeColumn.messages"
      [getSpeakerColor]="getSpeakerColor"
      [getSpeakerBgColor]="getSpeakerBgColor"
      [getSpeakerBorder]="getSpeakerBorder"
      [getHighlightedText]="getHighlightedTextForColumn(activeColumn)"
      (messageHover)="hoverSentenceForColumn(activeColumn, null)"
      class="conversation-thread-viewer">
    </app-conversation-viewer>
  </div>
</div>
